services:

  # ── Kong API Gateway ──────────────────────────────────────────────────────
  supabase-kong:
    image: kong:2.8.1
    restart: unless-stopped
    entrypoint: bash -c 'eval "echo \"$$(cat ~/temp.yml)\"" > ~/kong.yml && /docker-entrypoint.sh kong docker-start'
    ports:
      - "${KONG_HTTP_PORT:-8000}:8000"
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      KONG_PORT_MAPS: "443:8000"
      JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: "LAST,A,CNAME"
      KONG_PLUGINS: "request-transformer,cors,key-auth,acl,basic-auth"
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: "160k"
      KONG_NGINX_PROXY_PROXY_BUFFERS: "64 160k"
      SUPABASE_ANON_KEY: "${SERVICE_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_KEY: "${SERVICE_SUPABASE_SERVICE_KEY}"
      DASHBOARD_USERNAME: "${SERVICE_USER_ADMIN}"
      DASHBOARD_PASSWORD: "${SERVICE_PASSWORD_ADMIN}"
      KONG_STORAGE_CONNECT_TIMEOUT: "${KONG_STORAGE_CONNECT_TIMEOUT:-60}"
      KONG_STORAGE_WRITE_TIMEOUT: "${KONG_STORAGE_WRITE_TIMEOUT:-3600}"
      KONG_STORAGE_READ_TIMEOUT: "${KONG_STORAGE_READ_TIMEOUT:-3600}"
      KONG_STORAGE_REQUEST_BUFFERING: "${KONG_STORAGE_REQUEST_BUFFERING:-false}"
      KONG_STORAGE_RESPONSE_BUFFERING: "${KONG_STORAGE_RESPONSE_BUFFERING:-false}"
    volumes:
      - type: bind
        source: ./volumes/api/kong.yml
        target: /home/kong/temp.yml
        read_only: true
    networks:
      - supabase-net

  # ── Supabase Studio ───────────────────────────────────────────────────────
  supabase-studio:
    image: supabase/studio:2026.04.20-sha-b721a2d
    restart: unless-stopped
    # Coolify проксирует Studio через свой домен.
    # Порт здесь не пробрасывается наружу — Kong сам маршрутизирует /
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/platform/profile').then((r)=>{if(r.status!==200)throw new Error(r.status)})"
      timeout: 5s
      interval: 5s
      retries: 3
    environment:
      HOSTNAME: "0.0.0.0"
      STUDIO_PG_META_URL: "http://supabase-meta:8080"
      POSTGRES_PASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
      POSTGRES_HOST: "${POSTGRES_HOSTNAME:-supabase-db}"
      CURRENT_CLI_VERSION: "2.67.1"
      DEFAULT_ORGANIZATION_NAME: "${STUDIO_DEFAULT_ORGANIZATION:-Default Organization}"
      DEFAULT_PROJECT_NAME: "${STUDIO_DEFAULT_PROJECT:-Default Project}"
      SUPABASE_URL: "http://supabase-kong:8000"
      SUPABASE_PUBLIC_URL: "${SERVICE_URL_SUPABASE_KONG}"
      SUPABASE_ANON_KEY: "${SERVICE_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_KEY: "${SERVICE_SUPABASE_SERVICE_KEY}"
      AUTH_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      SUPABASE_PUBLIC_API: "${SERVICE_URL_SUPABASE_KONG}"
      NEXT_PUBLIC_SUPABASE_URL: "${SERVICE_URL_SUPABASE_KONG}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${SERVICE_SUPABASE_ANON_KEY}"
      NEXT_PUBLIC_ENABLE_LOGS: "false"
      NEXT_PUBLIC_ENABLE_EDGE_FUNCTIONS: "true"
      NEXT_ANALYTICS_BACKEND_PROVIDER: "postgres"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SNIPPETS_MANAGEMENT_FOLDER: /app/snippets
      EDGE_FUNCTIONS_MANAGEMENT_FOLDER: /app/edge-functions
    volumes:
      - ./volumes/snippets:/app/snippets:Z
      - ./volumes/functions:/app/edge-functions:Z
    networks:
      - supabase-net

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  supabase-db:
    image: supabase/postgres:15.8.1.048
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U postgres -h 127.0.0.1
      interval: 5s
      timeout: 5s
      retries: 10
    # Порт для прямого доступа (psql, migrations). В prod можно убрать.
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:${POSTGRES_PORT:-5432}"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
      - -c
      - wal_level=logical
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: "${POSTGRES_PORT:-5432}"
      POSTGRES_PORT: "${POSTGRES_PORT:-5432}"
      PGPASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
      POSTGRES_PASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
      PGDATABASE: "${POSTGRES_DB:-postgres}"
      POSTGRES_DB: "${POSTGRES_DB:-postgres}"
      JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      JWT_EXP: "${JWT_EXPIRY:-3600}"
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - supabase-db-config:/etc/postgresql-custom
      - supabase-snippets:/docker-entrypoint-initdb.d/snippets
      - type: bind
        source: ./volumes/db/realtime.sql
        target: /docker-entrypoint-initdb.d/migrations/99-realtime.sql
        read_only: true
      - type: bind
        source: ./volumes/db/_supabase.sql
        target: /docker-entrypoint-initdb.d/migrations/97-_supabase.sql
        read_only: true
      - type: bind
        source: ./volumes/db/webhooks.sql
        target: /docker-entrypoint-initdb.d/init-scripts/98-webhooks.sql
        read_only: true
      - type: bind
        source: ./volumes/db/roles.sql
        target: /docker-entrypoint-initdb.d/init-scripts/99-roles.sql
        read_only: true
      - type: bind
        source: ./volumes/db/jwt.sql
        target: /docker-entrypoint-initdb.d/init-scripts/99-jwt.sql
        read_only: true
      - type: bind
        source: ./volumes/db/logs.sql
        target: /docker-entrypoint-initdb.d/migrations/99-logs.sql
        read_only: true
    networks:
      - supabase-net

  # ── PostgREST ─────────────────────────────────────────────────────────────
  supabase-rest:
    image: postgrest/postgrest:v12.2.12
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    command: postgrest
    environment:
      PGRST_DB_URI: "postgres://authenticator:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}"
      PGRST_DB_SCHEMAS: "${PGRST_DB_SCHEMAS:-public,storage,graphql_public}"
      PGRST_DB_ANON_ROLE: "anon"
      PGRST_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_APP_SETTINGS_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      PGRST_APP_SETTINGS_JWT_EXP: "${JWT_EXPIRY:-3600}"
    networks:
      - supabase-net

  # ── GoTrue (Auth) ─────────────────────────────────────────────────────────
  supabase-auth:
    image: supabase/gotrue:v2.174.0
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:9999/health]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      API_EXTERNAL_URL: "${API_EXTERNAL_URL:-http://supabase-kong:8000}"
      GOTRUE_DB_DRIVER: "postgres"
      GOTRUE_DB_DATABASE_URL: "postgres://supabase_auth_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}"
      GOTRUE_SITE_URL: "${SERVICE_URL_SUPABASE_KONG}"
      GOTRUE_URI_ALLOW_LIST: "${ADDITIONAL_REDIRECT_URLS}"
      GOTRUE_DISABLE_SIGNUP: "${DISABLE_SIGNUP:-false}"
      GOTRUE_JWT_ADMIN_ROLES: "service_role"
      GOTRUE_JWT_AUD: "authenticated"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: "authenticated"
      GOTRUE_JWT_EXP: "${JWT_EXPIRY:-3600}"
      GOTRUE_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "${ENABLE_EMAIL_SIGNUP:-true}"
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "${ENABLE_ANONYMOUS_USERS:-false}"
      GOTRUE_MAILER_AUTOCONFIRM: "${ENABLE_EMAIL_AUTOCONFIRM:-false}"
      GOTRUE_SMTP_ADMIN_EMAIL: "${SMTP_ADMIN_EMAIL}"
      GOTRUE_SMTP_HOST: "${SMTP_HOST}"
      GOTRUE_SMTP_PORT: "${SMTP_PORT:-587}"
      GOTRUE_SMTP_USER: "${SMTP_USER}"
      GOTRUE_SMTP_PASS: "${SMTP_PASS}"
      GOTRUE_SMTP_SENDER_NAME: "${SMTP_SENDER_NAME}"
      GOTRUE_MAILER_URLPATHS_INVITE: "${MAILER_URLPATHS_INVITE:-/auth/v1/verify}"
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: "${MAILER_URLPATHS_CONFIRMATION:-/auth/v1/verify}"
      GOTRUE_MAILER_URLPATHS_RECOVERY: "${MAILER_URLPATHS_RECOVERY:-/auth/v1/verify}"
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: "${MAILER_URLPATHS_EMAIL_CHANGE:-/auth/v1/verify}"
      GOTRUE_MAILER_TEMPLATES_INVITE: "${MAILER_TEMPLATES_INVITE}"
      GOTRUE_MAILER_TEMPLATES_CONFIRMATION: "${MAILER_TEMPLATES_CONFIRMATION}"
      GOTRUE_MAILER_TEMPLATES_RECOVERY: "${MAILER_TEMPLATES_RECOVERY}"
      GOTRUE_MAILER_TEMPLATES_MAGIC_LINK: "${MAILER_TEMPLATES_MAGIC_LINK}"
      GOTRUE_MAILER_TEMPLATES_EMAIL_CHANGE: "${MAILER_TEMPLATES_EMAIL_CHANGE}"
      GOTRUE_MAILER_SUBJECTS_CONFIRMATION: "${MAILER_SUBJECTS_CONFIRMATION}"
      GOTRUE_MAILER_SUBJECTS_RECOVERY: "${MAILER_SUBJECTS_RECOVERY}"
      GOTRUE_MAILER_SUBJECTS_MAGIC_LINK: "${MAILER_SUBJECTS_MAGIC_LINK}"
      GOTRUE_MAILER_SUBJECTS_EMAIL_CHANGE: "${MAILER_SUBJECTS_EMAIL_CHANGE}"
      GOTRUE_MAILER_SUBJECTS_INVITE: "${MAILER_SUBJECTS_INVITE}"
      GOTRUE_EXTERNAL_PHONE_ENABLED: "${ENABLE_PHONE_SIGNUP:-true}"
      GOTRUE_SMS_AUTOCONFIRM: "${ENABLE_PHONE_AUTOCONFIRM:-true}"
    networks:
      - supabase-net

  # ── Realtime ──────────────────────────────────────────────────────────────
  realtime-dev:
    image: supabase/realtime:v2.34.47
    restart: unless-stopped
    # container_name убран — Coolify управляет именами сам
    healthcheck:
      test:
        - CMD
        - curl
        - -sSfL
        - --head
        - -o
        - /dev/null
        - -H
        - "Authorization: Bearer ${SERVICE_SUPABASE_ANON_KEY}"
        - http://127.0.0.1:4000/api/tenants/realtime-dev/health
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PORT: "4000"
      DB_HOST: "${POSTGRES_HOSTNAME:-supabase-db}"
      DB_PORT: "${POSTGRES_PORT:-5432}"
      DB_USER: "supabase_admin"
      DB_PASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
      DB_NAME: "${POSTGRES_DB:-postgres}"
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: "supabaserealtime"
      API_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      FLY_ALLOC_ID: "fly123"
      FLY_APP_NAME: "realtime"
      SECRET_KEY_BASE: "${SECRET_PASSWORD_REALTIME}"
      ERL_AFLAGS: "-proto_dist inet_tcp"
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      RLIMIT_NOFILE: "10000"
      APP_NAME: "realtime"
      SEED_SELF_HOST: "true"
      LOG_LEVEL: "error"
      RUN_JANITOR: "true"
      JANITOR_INTERVAL: "60000"
    command: >
      sh -c "/app/bin/migrate &&
             /app/bin/realtime eval 'Realtime.Release.seeds(Realtime.Repo)' &&
             /app/bin/server"
    networks:
      - supabase-net

  # ── MinIO (S3-compatible storage backend) ─────────────────────────────────
  supabase-minio:
    image: ghcr.io/coollabsio/minio:RELEASE.2025-10-15T17-29-55Z
    restart: unless-stopped
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 5s
      timeout: 20s
      retries: 10
    environment:
      MINIO_ROOT_USER: "${SERVICE_USER_MINIO}"
      MINIO_ROOT_PASSWORD: "${SERVICE_PASSWORD_MINIO}"
    command: server --console-address ":9001" /data
    volumes:
      - supabase-minio-data:/data
    networks:
      - supabase-net

  # ── MinIO bucket init (runs once, exits) ──────────────────────────────────
  minio-createbucket:
    image: minio/mc
    restart: "no"
    depends_on:
      supabase-minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: "${SERVICE_USER_MINIO}"
      MINIO_ROOT_PASSWORD: "${SERVICE_PASSWORD_MINIO}"
    entrypoint: [/entrypoint.sh]
    volumes:
      - type: bind
        source: ./entrypoint.sh
        target: /entrypoint.sh
        read_only: true
    networks:
      - supabase-net

  # ── Storage API ───────────────────────────────────────────────────────────
  supabase-storage:
    image: supabase/storage-api:v1.14.6
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:5000/status]
      timeout: 5s
      interval: 5s
      retries: 3
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    environment:
      SERVER_PORT: "5000"
      SERVER_REGION: "local"
      MULTI_TENANT: "false"
      AUTH_JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      DATABASE_URL: "postgres://supabase_storage_admin:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}"
      DB_INSTALL_ROLES: "false"
      STORAGE_BACKEND: "s3"
      STORAGE_S3_BUCKET: "stub"
      STORAGE_S3_ENDPOINT: "http://supabase-minio:9000"
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      STORAGE_S3_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "${SERVICE_USER_MINIO}"
      AWS_SECRET_ACCESS_KEY: "${SERVICE_PASSWORD_MINIO}"
      UPLOAD_FILE_SIZE_LIMIT: "524288000"
      UPLOAD_FILE_SIZE_LIMIT_STANDARD: "524288000"
      UPLOAD_SIGNED_URL_EXPIRATION_TIME: "120"
      TUS_URL_PATH: "upload/resumable"
      TUS_MAX_SIZE: "3600000"
      ENABLE_IMAGE_TRANSFORMATION: "true"
      DATABASE_SEARCH_PATH: "storage"
      NODE_ENV: "production"
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
    volumes:
      - supabase-storage-data:/var/lib/storage
    networks:
      - supabase-net

  # ── pg-meta ───────────────────────────────────────────────────────────────
  supabase-meta:
    image: supabase/postgres-meta:v0.89.3
    restart: unless-stopped
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PG_META_PORT: "8080"
      PG_META_DB_HOST: "${POSTGRES_HOSTNAME:-supabase-db}"
      PG_META_DB_PORT: "${POSTGRES_PORT:-5432}"
      PG_META_DB_NAME: "${POSTGRES_DB:-postgres}"
      PG_META_DB_USER: "supabase_admin"
      PG_META_DB_PASSWORD: "${SERVICE_PASSWORD_POSTGRES}"
    networks:
      - supabase-net

  # ── Functions server (Bun/Hono — replaces Deno edge-runtime) ─────────────
  functions-server:
    build:
      context: ./functions-server
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:9000/health]
      timeout: 3s
      interval: 5s
      retries: 5
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      SUPABASE_URL: "http://supabase-kong:8000"
      SUPABASE_ANON_KEY: "${SERVICE_SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SERVICE_SUPABASE_SERVICE_KEY}"
      JWT_SECRET: "${SERVICE_PASSWORD_JWT}"
      DATABASE_URL: "postgres://postgres:${SERVICE_PASSWORD_POSTGRES}@${POSTGRES_HOSTNAME:-supabase-db}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-postgres}"
    networks:
      - supabase-net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  supabase-db-data:
  supabase-db-config:
  supabase-snippets:
  supabase-minio-data:
  supabase-storage-data:

# ── Network ───────────────────────────────────────────────────────────────────
networks:
  supabase-net:
    driver: bridge