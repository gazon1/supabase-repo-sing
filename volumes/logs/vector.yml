api:
  enabled: true
  address: 0.0.0.0:9001

sources:
  docker_host:
    type: docker_logs
    exclude_containers:
      - supabase-vector

# ✅ Fixed vector.yml — transforms section
transforms:
  project_logs:
    type: remap
    inputs:
      - docker_host
    source: |
      .project = "default"
      .event_message = del(.message)
      
      # Extract container_name and ensure it's a string
      .appname = to_string(del(.container_name)) ?? "unknown"
      
      # Safely delete other fields (they're not used later)
      del(.container_created_at)
      del(.container_id)
      del(.source_type)
      del(.stream)
      del(.label)
      
      # Ensure .appname is never null for routing
      if is_null(.appname) || .appname == "" {
        .appname = "unknown"
      }

  router:
    type: route
    inputs:
      - project_logs
    route:
      # Use to_string() + ?? "" to guarantee string type for starts_with()
      kong: 'starts_with(to_string(.appname) ?? "", "supabase-kong")'
      auth: 'starts_with(to_string(.appname) ?? "", "supabase-auth")'
      rest: 'starts_with(to_string(.appname) ?? "", "supabase-rest")'
      realtime: 'starts_with(to_string(.appname) ?? "", "realtime-dev")'
      storage: 'starts_with(to_string(.appname) ?? "", "supabase-storage")'
      functions: 'starts_with(to_string(.appname) ?? "", "functions-server")'
      db: 'starts_with(to_string(.appname) ?? "", "supabase-db")'

sinks:
  logflare_kong:
    type: http
    inputs:
      - router.kong
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=kong

  logflare_auth:
    type: http
    inputs:
      - router.auth
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=gotrue

  logflare_rest:
    type: http
    inputs:
      - router.rest
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=postgrest

  logflare_realtime:
    type: http
    inputs:
      - router.realtime
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=realtime

  logflare_storage:
    type: http
    inputs:
      - router.storage
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=storage

  logflare_functions:
    type: http
    inputs:
      - router.functions
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=edge-runtime

  logflare_db:
    type: http
    inputs:
      - router.db
    encoding:
      codec: json
    method: post
    request:
      headers:
        Content-Type: application/json
        X-API-KEY: "${LOGFLARE_API_KEY}"
    uri: http://supabase-analytics:4000/logs/logflare?source_name=postgres