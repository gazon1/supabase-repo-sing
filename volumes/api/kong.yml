_format_version: '2.1'
_transform: true

###
### Consumers / Users
###
consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: ${SUPABASE_ANON_KEY}
  - username: service_role
    keyauth_credentials:
      - key: ${SUPABASE_SERVICE_KEY}

###
### Access Control List
###
acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

###
### Dashboard credentials
###
basicauth_credentials:
  - consumer: DASHBOARD
    username: ${DASHBOARD_USERNAME}
    password: ${DASHBOARD_PASSWORD}

###
### API Routes
###
services:

  ## ── Open Auth routes (no key required) ────────────────────────────────────
  - name: auth-v1-open
    url: http://supabase-auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths: [/auth/v1/verify]
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://supabase-auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths: [/auth/v1/callback]
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://supabase-auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths: [/auth/v1/authorize]
    plugins:
      - name: cors

  ## ── Secure Auth routes ────────────────────────────────────────────────────
  - name: auth-v1
    _comment: 'GoTrue: /auth/v1/* -> http://supabase-auth:9999/*'
    url: http://supabase-auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths: [/auth/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  ## ── REST (PostgREST) ──────────────────────────────────────────────────────
  - name: rest-v1
    _comment: 'PostgREST: /rest/v1/* -> http://supabase-rest:3000/*'
    url: http://supabase-rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths: [/rest/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  ## ── GraphQL ───────────────────────────────────────────────────────────────
  - name: graphql-v1
    _comment: 'PostgREST: /graphql/v1/* -> http://supabase-rest:3000/rpc/graphql'
    url: http://supabase-rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths: [/graphql/v1]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: request-transformer
        config:
          add:
            headers:
              - Content-Profile:graphql_public
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  ## ── Realtime (WebSocket) ──────────────────────────────────────────────────
  - name: realtime-v1-ws
    _comment: 'Realtime WS: /realtime/v1/* -> ws://realtime-dev:4000/socket/*'
    url: http://realtime-dev:4000/socket
    protocol: ws
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths: [/realtime/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  - name: realtime-v1-rest
    _comment: 'Realtime REST: /realtime/v1/api -> http://realtime-dev:4000/api'
    url: http://realtime-dev:4000/api
    protocol: http
    routes:
      - name: realtime-v1-rest
        strip_path: true
        paths: [/realtime/v1/api]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  ## ── Storage ───────────────────────────────────────────────────────────────
  - name: storage-v1
    _comment: 'Storage: /storage/v1/* -> http://supabase-storage:5000/*'
    url: http://supabase-storage:5000/
    connect_timeout: ${KONG_STORAGE_CONNECT_TIMEOUT}
    write_timeout: ${KONG_STORAGE_WRITE_TIMEOUT}
    read_timeout: ${KONG_STORAGE_READ_TIMEOUT}
    routes:
      - name: storage-v1-all
        strip_path: true
        paths: [/storage/v1/]
        request_buffering: ${KONG_STORAGE_REQUEST_BUFFERING}
        response_buffering: ${KONG_STORAGE_RESPONSE_BUFFERING}
    plugins:
      - name: cors

  ## ── Functions (Bun/Hono — replaces Deno edge-runtime) ────────────────────
  - name: functions-v1
    _comment: 'Functions: /functions/v1/* -> http://functions-server:9000/*'
    url: http://functions-server:9000/
    routes:
      - name: functions-v1-all
        strip_path: true
        paths: [/functions/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin, anon]

  ## ── Analytics ─────────────────────────────────────────────────────────────
  - name: analytics-v1
    _comment: 'Analytics: /analytics/v1/* -> http://supabase-analytics:4000/*'
    url: http://supabase-analytics:4000/
    routes:
      - name: analytics-v1-all
        strip_path: true
        paths: [/analytics/v1/]

  ## ── pg-meta (DB management) ───────────────────────────────────────────────
  - name: meta
    _comment: 'pg-meta: /pg/* -> http://supabase-meta:8080/*'
    url: http://supabase-meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths: [/pg/]
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow: [admin]

  ## ── Studio (catch-all, must be last) ─────────────────────────────────────
  - name: dashboard
    _comment: 'Studio: /* -> http://supabase-studio:3000/*'
    url: http://supabase-studio:3000/
    routes:
      - name: dashboard-all
        strip_path: true
        paths: [/]
    plugins:
      - name: cors
      - name: basic-auth
        config:
          hide_credentials: true