_format_version: '3.0'

consumers:
  - username: DASHBOARD
    tags:
      - dashboard
  - username: anon
    tags:
      - anon
  - username: service_role
    tags:
      - service_role

basicauth_credentials:
  - username: "$DASHBOARD_USERNAME"
    password: "$DASHBOARD_PASSWORD"
    consumer: DASHBOARD
    tags:
      - dashboard

keyauth_credentials:
  - key: "$ANON_KEY"
    consumer: anon
    tags:
      - anon
  - key: "$SERVICE_ROLE_KEY"
    consumer: service_role
    tags:
      - service_role

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1
        strip_path: true
        paths: [/auth/v1/]
    plugins:
      - name: cors

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1
        strip_path: true
        paths: [/rest/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names: [apikey, Authorization]

  - name: realtime-v1
    url: http://realtime:4000/socket
    routes:
      - name: realtime-v1
        strip_path: true
        paths: [/realtime/v1/]
    plugins:
      - name: cors

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1
        strip_path: true
        paths: [/storage/v1/]
    plugins:
      - name: cors

  - name: functions-v1
    url: http://functions:9000/
    routes:
      - name: functions-v1
        strip_path: true
        paths: [/functions/v1/]
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
          key_names: [apikey, Authorization]

  - name: meta
    url: http://meta:8080/
    routes:
      - name: meta
        strip_path: true
        paths: [/pg/]
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
          key_names: [apikey]

  - name: studio
    url: http://studio:3000/
    routes:
      - name: studio
        strip_path: true
        paths: [/]
    plugins:
      - name: cors
      - name: basic-auth
        config:
          hide_credentials: true